name: Publish to PyPI

on:
  push:
    tags: ['v*']
  workflow_dispatch:

jobs:
  check-version:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - name: Tag matches packaging version
        if: startsWith(github.ref, 'refs/tags/v')
        run: |
          set -eu
          tag="${GITHUB_REF_NAME#v}"
          v=$(grep -m1 '^version = ' packaging/pyproject.toml | cut -d'"' -f2)
          [ "$v" = "$tag" ] || { echo "::error::packaging version $v != tag $tag"; exit 1; }

  build-wheels:
    runs-on: macos-14
    timeout-minutes: 30
    strategy:
      matrix:
        python: ["3.10", "3.11", "3.12"]
    env:
      MACOSX_DEPLOYMENT_TARGET: "13.0"
    steps:
      - uses: actions/checkout@v4
      - uses: astral-sh/setup-uv@v3
      - name: Build alloy-kit wheel (cp${{ matrix.python }})
        run: uv build --wheel packaging --python ${{ matrix.python }} --out-dir dist
      - uses: actions/upload-artifact@v4
        with:
          name: wheels-${{ matrix.python }}
          path: dist/*.whl

  publish:
    needs: [check-version, build-wheels]
    runs-on: ubuntu-latest
    environment: pypi
    permissions:
      id-token: write
    steps:
      - uses: actions/download-artifact@v4
        with:
          path: dist
          pattern: wheels-*
          merge-multiple: true
      - uses: pypa/gh-action-pypi-publish@release/v1
        with:
          packages-dir: dist
