[build-system]
requires = ["hatchling"]
build-backend = "hatchling.build"

[project]
name = "alloy-torch"
version = "0.1.2"
description = "Alloy torch.compile backend for Apple Silicon: lowers FX graphs to Metal kernel dispatches"
license = "Apache-2.0"
authors = [{ name = "Rayan Hatout", email = "rayan.hatout@gmail.com" }]
requires-python = ">=3.10"
keywords = ["torch.compile", "pytorch", "metal", "apple-silicon", "compiler", "backend"]
classifiers = [
    "Development Status :: 3 - Alpha",
    "Environment :: GPU",
    "Intended Audience :: Developers",
    "Operating System :: MacOS :: MacOS X",
    "Programming Language :: Python :: 3",
    "Topic :: Scientific/Engineering :: Artificial Intelligence",
]
dependencies = [
    "alloy-metal",
    "numpy",
    "torch",
]

[project.urls]
Homepage = "https://github.com/rayanht/alloy"
Repository = "https://github.com/rayanht/alloy"
Issues = "https://github.com/rayanht/alloy/issues"

[tool.hatch.build.targets.wheel]
packages = ["src/alloy_torch"]
